name: amfi
kind: file
endpoints:
  navall:
    url: "https://www.amfiindia.com/spages/NAVAll.txt"
    encoding: "utf-8"
    artifact: navall
    suffix: txt

# Pipe in AMFI is actually a semicolon. Field order in file header line:
#   Scheme Code;ISIN Div Payout/ ISIN Growth;ISIN Div Reinvestment;Scheme Name;Net Asset Value;Date
parser:
  delimiter: ";"
  date_format: "%d-%b-%Y"
  section_regex: '^\s*(Open Ended|Close Ended|Interval Fund) Schemes\((.+)\)\s*$'
  null_tokens: ["", "N.A.", "-", "N/A"]
